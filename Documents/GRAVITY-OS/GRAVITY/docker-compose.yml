version: '3.8'
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gravity
      POSTGRES_PASSWORD: gravity_dev
      POSTGRES_DB: gravity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  searxng:
    image: searxng/searxng:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET_KEY=gravity_searxng_dev_secret
    volumes:
      - ./searxng:/etc/searxng
      - searxng_data:/data

volumes:
  postgres_data:
  searxng_data:
