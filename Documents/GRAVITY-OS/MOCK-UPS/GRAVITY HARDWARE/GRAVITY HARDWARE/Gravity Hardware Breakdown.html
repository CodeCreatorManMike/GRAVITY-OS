<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GRAVITY · Hardware Breakdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0a0b; --card:#0b0b0d; --card2:#0d0d0f;
    --text:#e7e6e2; --dim:#8b8b90; --faint:#5c5c62;
    --line:rgba(255,255,255,0.08); --line2:rgba(255,255,255,0.05);
    --accent:#e0794a; --ink:#15140f; --paper:#ece7da; --draw:#d7d2c4;
    --sans:'Space Grotesk',sans-serif; --mono:'JetBrains Mono',monospace; --term:'Space Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  body{background-image:radial-gradient(circle at 50% -10%,rgba(255,255,255,0.025),transparent 60%);}
  .page{max-width:1240px;margin:0 auto;padding:46px 40px 80px;}

  /* masthead */
  .mh-top{display:flex;justify-content:space-between;align-items:baseline;}
  .mh-mark{font-family:var(--sans);font-weight:700;font-size:30px;letter-spacing:3px;display:flex;align-items:center;gap:13px;}
  .mh-badge{font-size:24px;color:var(--accent);}
  .mh-rev{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:2px;}
  .mh-top-r{display:flex;flex-direction:column;align-items:flex-end;gap:9px;}
  .mh-nav{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--accent);text-decoration:none;border:1px solid rgba(224,121,74,0.42);padding:7px 13px;border-radius:2px;white-space:nowrap;transition:background .15s,border-color .15s;}
  .mh-nav:hover{background:rgba(224,121,74,0.1);border-color:var(--accent);}
  .mh-line{height:1px;background:var(--line);margin:18px 0;}
  .mh-sub{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:3px;}
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;}
  .chip{border:1px solid var(--line);border-radius:2px;padding:8px 14px;display:flex;flex-direction:column;gap:3px;min-width:96px;}
  .chip-k{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:1.5px;}
  .chip-v{font-size:14px;color:var(--text);}

  /* sections */
  .section{margin-top:74px;}
  .sec-head{margin-bottom:30px;}
  .sec-head-row{display:flex;align-items:center;gap:16px;}
  .badge{width:34px;height:34px;border:1px solid rgba(255,255,255,0.28);border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--paper);flex-shrink:0;}
  .sec-title{font-family:var(--sans);font-weight:600;font-size:27px;letter-spacing:0.4px;margin:0;}
  .sec-tag{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:2px;}
  .sec-blurb{margin:16px 0 0;max-width:760px;color:var(--dim);font-size:15px;line-height:1.6;}

  /* object section */
  .object-grid{display:grid;grid-template-columns:1.08fr 0.92fr;gap:26px;align-items:stretch;}
  .hero-card{position:relative;background:var(--card2);border:1px solid var(--line);border-radius:4px;display:grid;place-items:center;min-height:540px;overflow:hidden;}
  .hero-svg{width:100%;max-width:470px;height:auto;}
  .card-corner{position:absolute;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:1.5px;padding:14px 16px;}
  .card-corner.tl{top:0;left:0;} .card-corner.tr{top:0;right:0;text-align:right;}
  .card-corner.bl{bottom:0;left:0;} .card-corner.br{bottom:0;right:0;text-align:right;}
  .object-side{display:flex;flex-direction:column;gap:18px;}
  .spec-list{border-top:1px solid var(--line);}
  .spec-item{display:grid;grid-template-columns:78px 1fr;gap:16px;padding:15px 2px;border-bottom:1px solid var(--line);}
  .spec-k{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;padding-top:2px;}
  .spec-v{font-size:13.5px;color:var(--text);line-height:1.5;}
  .glance-note{display:flex;gap:20px;align-items:center;background:var(--card2);border:1px solid var(--line);border-radius:4px;padding:20px;}
  .glance-face{flex-shrink:0;}
  .glance-h{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:2px;margin-bottom:8px;}
  .glance-text p{margin:0;font-size:12.5px;color:var(--dim);line-height:1.55;}
  .glance-text b{color:var(--text);font-weight:600;}

  /* interactive stage */
  .stage-grid{display:grid;grid-template-columns:minmax(0,1fr) 366px;gap:22px;align-items:start;}
  .drawing-card{background:var(--card);border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .dc-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);gap:12px;}
  .dc-bar-l{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;}
  .toggle{display:flex;align-items:center;gap:8px;background:none;border:1px solid rgba(255,255,255,0.16);color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 12px;border-radius:2px;cursor:pointer;white-space:nowrap;}
  .toggle:hover{border-color:rgba(255,255,255,0.32);}
  .toggle-box{width:9px;height:9px;border:1px solid currentColor;}
  .toggle.on{border-color:var(--accent);color:var(--accent);}
  .toggle.on .toggle-box{background:var(--accent);}
  .dc-stage{padding:6px 6px 0;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,0.02),transparent 70%);}
  .cs-svg{width:100%;height:auto;display:block;}
  .dc-controls{display:flex;align-items:center;gap:18px;padding:14px 22px 26px;}
  .nav-btn{background:none;border:1px solid rgba(255,255,255,0.16);color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:9px 12px;border-radius:2px;cursor:pointer;white-space:nowrap;}
  .nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .nav-btn:disabled{opacity:0.28;cursor:default;}

  /* slider */
  .slider{flex:1;min-width:0;}
  .slider.is-disabled{opacity:0.4;pointer-events:none;}
  .slider-label{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;margin-bottom:22px;}
  .slider-hint{color:var(--faint);}
  .slider-track{position:relative;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin:0 14px;cursor:pointer;}
  .slider-fill{position:absolute;height:100%;background:var(--accent);border-radius:2px;left:0;transition:width .25s cubic-bezier(.4,0,.2,1);}
  .stop{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:none;border:none;cursor:pointer;padding:0;}
  .stop-dot{display:block;width:11px;height:11px;border-radius:50%;background:var(--card);border:1.5px solid rgba(255,255,255,0.3);margin:auto;transition:all .2s;}
  .stop.passed .stop-dot{border-color:var(--accent);}
  .stop.on .stop-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px rgba(224,121,74,0.16);}
  .stop-code{position:absolute;top:-21px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--faint);}
  .stop.on .stop-code{color:var(--accent);}
  .stop.passed .stop-code{color:var(--dim);}
  .thumb{position:absolute;top:50%;width:2px;height:16px;background:var(--accent);transform:translate(-50%,-50%);pointer-events:none;opacity:0;transition:left .25s cubic-bezier(.4,0,.2,1);}

  /* manifest */
  .manifest{background:var(--card);border:1px solid var(--line);border-radius:4px;display:flex;flex-direction:column;position:sticky;top:20px;}
  .mf-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);}
  .mf-head-code{font-family:var(--mono);font-size:12px;color:var(--accent);border:1px solid var(--accent);width:30px;height:30px;display:grid;place-items:center;border-radius:2px;}
  .mf-head-title{font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:0.4px;}
  .mf-blurb{padding:14px 20px;color:var(--dim);font-size:12px;line-height:1.55;border-bottom:1px solid var(--line2);}
  .mf-count{padding:10px 20px;font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:2px;}
  .mf-scroll{overflow-y:auto;max-height:600px;}
  .mf-scroll::-webkit-scrollbar{width:8px;} .mf-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
  .mf-group-h{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;padding:14px 20px 6px;display:flex;gap:8px;border-top:1px solid var(--line2);}
  .mf-group-h span{color:var(--accent);}
  .mf-row{display:grid;grid-template-columns:26px 1fr auto;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line2);transition:background .15s;}
  .mf-row.on{background:rgba(224,121,74,0.08);box-shadow:inset 2px 0 0 var(--accent);}
  .mf-num{font-family:var(--mono);font-size:11px;color:var(--faint);padding-top:2px;}
  .mf-name{font-family:var(--sans);font-weight:600;font-size:13.5px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .mf-tag{font-family:var(--mono);font-size:8.5px;color:var(--accent);border:1px solid rgba(224,121,74,0.5);padding:1px 5px;border-radius:2px;letter-spacing:0.5px;}
  .mf-mpn{font-family:var(--mono);font-size:11px;color:#b9b6ad;margin-top:4px;}
  .mf-fn{font-size:11.5px;color:var(--dim);line-height:1.45;margin-top:4px;}
  .mf-bus{font-family:var(--mono);font-size:9.5px;color:var(--accent);padding-top:2px;white-space:nowrap;}

  /* cross-section svg */
  .cs-reg line{stroke:rgba(255,255,255,0.22);stroke-width:1;}
  .cs-frame{fill:none;stroke:rgba(215,210,196,0.22);stroke-width:1.2;}
  .cs-axis{stroke:rgba(255,255,255,0.1);stroke-width:0.8;stroke-dasharray:2 6;}
  .cs-fill{fill:rgba(255,255,255,0.04);stroke:var(--draw);stroke-width:1.1;}
  .cs-fill-shell{fill:rgba(255,255,255,0.03);stroke:rgba(215,210,196,0.55);stroke-width:1.3;}
  .cs-screen{fill:none;stroke:var(--draw);stroke-width:1;}
  .cs-screen-2{fill:none;stroke:rgba(215,210,196,0.4);stroke-width:0.8;}
  .cs-hint{fill:none;stroke:rgba(215,210,196,0.32);stroke-width:0.9;}
  .hatch-a{fill:url(#hatchA)!important;}
  .cs-paper{fill:rgba(236,231,218,0.1);stroke:var(--draw);stroke-width:1;}
  .cs-fpc{fill:none;stroke:var(--accent);stroke-width:1.5;}
  .cs-accent-fill{fill:rgba(224,121,74,0.45);stroke:var(--accent);stroke-width:1;}
  .cs-tick{stroke:rgba(215,210,196,0.4);stroke-width:0.7;}
  .cs-fill-pcb{fill:rgba(215,210,196,0.08);stroke:var(--draw);stroke-width:1;}
  .cs-module{fill:rgba(215,210,196,0.14);stroke:var(--draw);stroke-width:1.1;}
  .cs-hint-fill{fill:rgba(255,255,255,0.06);stroke:rgba(215,210,196,0.4);stroke-width:0.7;}
  .cs-keepout{fill:none;stroke:var(--accent);stroke-width:0.9;stroke-dasharray:3 3;opacity:0.75;}
  .cs-ic{fill:rgba(255,255,255,0.05);stroke:#bdb9ac;stroke-width:1;}
  .cs-pad{fill:var(--accent);}
  .cs-spk{fill:rgba(255,255,255,0.04);stroke:var(--draw);stroke-width:1.1;}
  .cs-spk-cone{fill:none;stroke:rgba(215,210,196,0.5);stroke-width:1;}
  .cs-batt{fill:rgba(224,121,74,0.07);stroke:var(--accent);stroke-width:1.2;}
  .cs-batt-label{fill:var(--draw);font-family:var(--mono);font-size:20px;letter-spacing:1px;}
  .cs-batt-sub{fill:rgba(215,210,196,0.6);font-family:var(--mono);font-size:11px;letter-spacing:1px;}
  .cs-pogo{stroke:var(--accent);stroke-width:1.6;fill:none;}
  .cs-anchor-dot-s{fill:var(--accent);}
  .cs-fill-base{fill:rgba(255,255,255,0.04);stroke:var(--draw);stroke-width:1.2;}
  .cs-mag{fill:rgba(255,255,255,0.09);stroke:#bdb9ac;stroke-width:1;}
  .cs-ghost-line{fill:none;stroke:rgba(215,210,196,0.55);stroke-width:1;}
  .cs-layer-ghost{opacity:0.16;}
  .cs-layer-solid{opacity:0.92;}
  .cs-layer-active,.cs-layer-ghost,.cs-layer-solid{transition:opacity .3s;}
  .cs-plane line{stroke:var(--accent);stroke-width:1;stroke-dasharray:4 4;opacity:0.7;}
  .cs-plane-tri{fill:var(--accent);}
  .cs-plane-tag{fill:var(--accent);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;}
  .cs-marker{cursor:pointer;}
  .cs-marker-bg{fill:rgba(10,10,11,0.92);stroke:var(--accent);stroke-width:1;}
  .cs-marker.on .cs-marker-bg{fill:var(--accent);}
  .cs-marker-num{fill:var(--accent);font-family:var(--mono);font-size:9px;}
  .cs-marker.on .cs-marker-num{fill:#0a0a0b;}
  .cs-leader{fill:none;stroke:rgba(215,210,196,0.42);stroke-width:0.9;}
  .cs-anchor-dot{fill:var(--accent);}
  .cs-label{cursor:default;}
  .cs-label.on .cs-leader{stroke:var(--accent);stroke-width:1.3;}
  .cs-lname{fill:var(--paper);font-family:var(--sans);font-size:14.5px;font-weight:600;}
  .cs-label.on .cs-lname{fill:#fff;}
  .cs-tag{fill:var(--accent);font-family:var(--mono);font-size:10px;font-weight:500;}
  .cs-lmpn{fill:#b9b6ad;font-family:var(--mono);font-size:11px;}
  .cs-lfn{fill:rgba(160,160,166,0.85);font-family:var(--mono);font-size:9.5px;}
  .cs-lbus{fill:var(--accent);font-family:var(--mono);font-size:9.5px;}
  .cs-title-box{fill:rgba(255,255,255,0.02);stroke:rgba(255,255,255,0.12);stroke-width:1;}
  .cs-title-h{fill:var(--paper);font-family:var(--mono);font-size:11px;letter-spacing:1px;}
  .cs-title-s{fill:var(--faint);font-family:var(--mono);font-size:9px;letter-spacing:1px;}

  /* eink face */
  .ef-rim{fill:var(--ink);font-family:var(--term);font-size:13px;letter-spacing:2px;opacity:0.62;}
  .ef-big{fill:var(--ink);font-family:var(--term);font-weight:700;font-size:120px;}
  .ef-mid{fill:var(--ink);font-family:var(--term);font-size:14px;letter-spacing:4px;}
  .ef-sup{fill:var(--ink);font-family:var(--term);font-size:12px;letter-spacing:2px;opacity:0.55;}
  .ef-ctx{fill:var(--ink);font-family:var(--term);font-size:12px;letter-spacing:1px;opacity:0.5;}

  /* footer */
  .footer{margin-top:66px;}
  .footer-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:1.5px;padding-top:16px;gap:16px;}

  @media(max-width:980px){
    .object-grid,.stage-grid{grid-template-columns:1fr;}
    .manifest{position:static;}
    .page{padding:32px 22px 64px;}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="gravity-data.js"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="cross-section.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
