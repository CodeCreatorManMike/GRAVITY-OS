<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GRAVITY · Engineering Drawings</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0a0b; --card:#0b0b0d; --card2:#0d0d0f;
    --text:#e7e6e2; --dim:#8b8b90; --faint:#5c5c62;
    --line:rgba(255,255,255,0.08); --line2:rgba(255,255,255,0.05);
    --accent:#e0794a; --ink:#15140f; --paper:#ece7da; --draw:#d7d2c4;
    --sans:'Space Grotesk',sans-serif; --mono:'JetBrains Mono',monospace; --term:'Space Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  body{background-image:radial-gradient(circle at 50% -10%,rgba(255,255,255,0.025),transparent 60%);}
  a{color:inherit;text-decoration:none;}
  .page{max-width:1080px;margin:0 auto;padding:46px 40px 80px;}

  /* masthead */
  .mh-top{display:flex;justify-content:space-between;align-items:baseline;}
  .mh-mark{font-family:var(--sans);font-weight:700;font-size:30px;letter-spacing:3px;display:flex;align-items:center;gap:13px;}
  .mh-badge{font-size:24px;color:var(--accent);}
  .mh-rev{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:2px;}
  .mh-line{height:1px;background:var(--line);margin:18px 0;}
  .mh-sub{font-family:var(--mono);font-size:11.5px;color:var(--dim);letter-spacing:3px;}
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;}
  .chip{border:1px solid var(--line);border-radius:2px;padding:8px 14px;display:flex;flex-direction:column;gap:3px;min-width:96px;}
  .chip-k{font-family:var(--mono);font-size:9px;color:var(--faint);letter-spacing:1.5px;}
  .chip-v{font-size:14px;color:var(--text);}

  /* drawing index */
  .dwg-index{margin-top:30px;border-top:1px solid var(--line);}
  .dwg-index-row{display:grid;grid-template-columns:64px 1fr auto;gap:16px;align-items:center;padding:11px 4px;border-bottom:1px solid var(--line2);transition:background .15s,padding .15s;}
  .dwg-index-row:hover{background:rgba(224,121,74,0.06);padding-left:12px;}
  .dwg-index-no{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:1px;}
  .dwg-index-t{font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:0.4px;}
  .dwg-index-g{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:1.5px;}
  .dwg-index-back .dwg-index-no,.dwg-index-back .dwg-index-t{color:var(--dim);}
  .dwg-index-back:hover .dwg-index-t{color:var(--text);}

  /* sheet card */
  .sheet{margin-top:30px;background:var(--card);border:1px solid var(--line);border-radius:4px;overflow:hidden;scroll-margin-top:20px;}
  .sheet-bar{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line);gap:12px;}
  .sheet-bar-l{display:flex;align-items:center;gap:14px;min-width:0;}
  .sheet-code{font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--accent);padding:4px 8px;border-radius:2px;letter-spacing:1px;flex-shrink:0;}
  .sheet-title{font-family:var(--sans);font-weight:600;font-size:16px;letter-spacing:0.4px;}
  .sheet-tag{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:1.5px;text-align:right;}
  .sheet-body{padding:10px 14px 16px;background:radial-gradient(circle at 50% 36%,rgba(255,255,255,0.018),transparent 72%);}

  /* interactive toolbar inside a sheet */
  .sheet-tools{display:flex;justify-content:space-between;align-items:center;padding:6px 6px 12px;gap:12px;}
  .sheet-tools-l{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;}
  .toggle{display:flex;align-items:center;gap:8px;background:none;border:1px solid rgba(255,255,255,0.16);color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 13px;border-radius:2px;cursor:pointer;white-space:nowrap;}
  .toggle:hover{border-color:rgba(255,255,255,0.32);}
  .toggle-box{width:9px;height:9px;border:1px solid currentColor;}
  .toggle.on{border-color:var(--accent);color:var(--accent);}
  .toggle.on .toggle-box{background:var(--accent);}

  .dwg-svg{width:100%;height:auto;display:block;}

  /* ---- dimension + leader grammar ---- */
  .dl-dim{stroke:rgba(215,210,196,0.55);stroke-width:0.9;fill:none;}
  .dl-fill{fill:rgba(215,210,196,0.7);}
  .dl-ext{stroke:rgba(215,210,196,0.3);stroke-width:0.7;}
  .dl-txt{fill:#cfcabb;font-family:var(--mono);font-size:12px;letter-spacing:0.5px;}
  .dl .acc .dl-dim,.dl.acc .dl-dim{stroke:var(--accent);}
  .dl.acc .dl-fill{fill:var(--accent);}
  .dl.acc .dl-txt{fill:var(--accent);}
  .dl-txt-bg{paint-order:stroke;stroke:var(--bg);stroke-width:5px;}

  .dl-leader{fill:none;stroke:rgba(215,210,196,0.4);stroke-width:0.9;}
  .dl-dot{fill:var(--accent);}
  .dl-name{fill:var(--paper);font-family:var(--sans);font-size:13.5px;font-weight:600;}
  .dl-tag{fill:var(--accent);font-family:var(--mono);font-size:10px;font-weight:500;}
  .dl-sub{fill:rgba(170,170,176,0.9);font-family:var(--mono);font-size:10.5px;letter-spacing:0.3px;}
  .dl-note{cursor:default;transition:opacity .4s;}
  .dl-note.on .dl-leader{stroke:var(--accent);stroke-width:1.3;}
  .dl-note.on .dl-name{fill:#fff;}

  .dl-reg{stroke:rgba(255,255,255,0.22);stroke-width:1;}
  .dl-scalebar .dl-dim{stroke:rgba(215,210,196,0.5);}
  .dl-scale-txt{fill:var(--faint);font-family:var(--mono);font-size:9.5px;letter-spacing:1px;}
  .dl-title-box{fill:rgba(255,255,255,0.02);stroke:rgba(255,255,255,0.14);stroke-width:1;}
  .dl-title-div{stroke:rgba(255,255,255,0.12);stroke-width:1;}
  .dl-title-h{fill:var(--paper);font-family:var(--mono);font-size:11px;letter-spacing:1px;}
  .dl-title-t{fill:var(--text);font-family:var(--sans);font-weight:600;font-size:11.5px;letter-spacing:0.2px;}
  .dl-title-s{fill:var(--faint);font-family:var(--mono);font-size:9px;letter-spacing:1px;}

  /* ---- part strokes ---- */
  .pt-shell{fill:rgba(255,255,255,0.028);stroke:rgba(215,210,196,0.55);stroke-width:1.4;}
  .pt-line{fill:none;stroke:var(--draw);stroke-width:1.2;}
  .pt-faint{fill:none;stroke:rgba(215,210,196,0.4);stroke-width:0.8;}
  .pt-faint-fill{fill:rgba(255,255,255,0.06);stroke:rgba(215,210,196,0.4);stroke-width:0.7;}
  .pt-glass{fill:rgba(255,255,255,0.022);stroke:rgba(215,210,196,0.32);stroke-width:0.9;}
  .pt-glass2{fill:rgba(224,121,74,0.1);stroke:var(--accent);stroke-width:0.9;}
  .pt-center{stroke:rgba(224,121,74,0.6);stroke-width:0.8;stroke-dasharray:7 3 1.5 3;fill:none;}
  .pt-hidden{stroke:rgba(215,210,196,0.35);stroke-width:0.8;stroke-dasharray:5 4;fill:none;}
  .pt-proj{stroke:rgba(215,210,196,0.16);stroke-width:0.7;stroke-dasharray:2 5;fill:none;}
  .pt-pogo{fill:var(--accent);}
  .pt-stand{stroke:rgba(215,210,196,0.72);stroke-width:5;fill:none;stroke-linecap:round;}
  .pt-stand-hi{stroke:var(--accent);stroke-width:1.4;fill:none;stroke-linecap:round;}
  .pt-anchor{fill:#bdb9ac;}
  .pt-pogo-line{stroke:var(--accent);stroke-width:1.6;fill:none;}
  .pt-pogo-fill{fill:var(--accent);stroke:none;}
  .pt-mag{fill:rgba(255,255,255,0.1);stroke:#bdb9ac;stroke-width:1;}
  .pt-hatch{fill:url(#dhatch);stroke:none;}
  .pt-detail-ring{fill:none;stroke:var(--accent);stroke-width:1.1;stroke-dasharray:4 3;}
  .pt-detail-leader{stroke:rgba(224,121,74,0.55);stroke-width:0.9;stroke-dasharray:4 3;}
  .pt-detail-box{fill:rgba(13,13,15,0.96);stroke:rgba(255,255,255,0.14);stroke-width:1;}

  /* view labels */
  .vw-label{fill:var(--paper);font-family:var(--mono);font-size:12px;letter-spacing:3px;}
  .vw-dim{fill:var(--faint);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;}

  /* ---- iso / solid fills ---- */
  .iso-shadow{fill:rgba(0,0,0,0.5);}
  .iso-wall{fill:rgba(255,255,255,0.05);stroke:rgba(215,210,196,0.5);stroke-width:1.3;}
  .iso-top{fill:rgba(255,255,255,0.07);stroke:none;}
  .iso-well{fill:rgba(0,0,0,0.45);stroke:none;}
  .iso-face{fill:rgba(255,255,255,0.04);stroke:rgba(215,210,196,0.55);stroke-width:1.3;}

  /* ---- exploded ---- */
  .ex-layer{transition:filter .2s;cursor:default;}
  .ex-layer.on{filter:drop-shadow(0 0 10px rgba(224,121,74,0.35));}
  .ex-glass{fill:rgba(255,255,255,0.04);stroke:none;}
  .ex-shell{fill:rgba(255,255,255,0.045);stroke:none;}
  .ex-pcb{fill:rgba(215,210,196,0.1);stroke:none;}
  .ex-ic{fill:rgba(255,255,255,0.06);stroke:#bdb9ac;stroke-width:0.9;}
  .ex-batt{fill:rgba(224,121,74,0.12);stroke:none;}
  .ex-batt-l{fill:var(--draw);font-family:var(--mono);font-size:15px;letter-spacing:1px;}
  .ex-batt-s{fill:rgba(215,210,196,0.6);font-family:var(--mono);font-size:9px;letter-spacing:1px;}
  .ex-axis{transition:opacity .4s;}
  .ex-axis-line{stroke:var(--accent);stroke-width:1;stroke-dasharray:5 4;opacity:0.6;}
  .ex-axis-tag{fill:var(--accent);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;}

  .footer{margin-top:54px;}
  .footer-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:1.5px;padding-top:16px;gap:16px;}

  @media(max-width:720px){
    .page{padding:32px 18px 60px;}
    .dwg-index-g{display:none;}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="gravity-data.js"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="draw-lib.jsx"></script>
  <script type="text/babel" src="sheet-ga.jsx"></script>
  <script type="text/babel" src="sheet-ortho.jsx"></script>
  <script type="text/babel" src="sheet-iso.jsx"></script>
  <script type="text/babel" src="sheet-explode.jsx"></script>
  <script type="text/babel" src="sheet-assembly.jsx"></script>
  <script type="text/babel" src="sheet-backstand.jsx"></script>
  <script type="text/babel" src="drawings-app.jsx"></script>
</body>
</html>
