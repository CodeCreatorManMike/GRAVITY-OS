name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: GRAVITY

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: GRAVITY/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Verify app imports cleanly
        run: python -c "from backend.main import app; print('import OK')"
        env:
          # Minimal env so config/settings don't raise on import
          DATABASE_URL: postgresql+asyncpg://gravity:test@localhost:5432/gravity
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-placeholder-secret-key-not-used-in-tests
          ALGORITHM: HS256
          ENVIRONMENT: test

      - name: Run tests
        # Skip gracefully if no tests directory or no test files exist yet
        run: |
          if [ -d tests ] && find tests -name "test_*.py" | grep -q .; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping pytest."
          fi
        env:
          DATABASE_URL: postgresql+asyncpg://gravity:test@localhost:5432/gravity
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-placeholder-secret-key-not-used-in-tests
          ALGORITHM: HS256
          ENVIRONMENT: test
